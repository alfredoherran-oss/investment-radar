<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Radar — Find Recent Funding Announcements</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #eef2ff;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .tagline { font-size: 0.85rem; color: var(--muted); }

    /* ── Layout ── */
    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

    /* ── Search card ── */
    .search-card {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-input {
      flex: 1;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: var(--text);
    }
    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .search-input::placeholder { color: #b0bec5; }

    .search-btn {
      padding: 13px 26px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-btn:hover:not(:disabled) { background: var(--primary-dark); }
    .search-btn:active:not(:disabled) { transform: scale(0.97); }
    .search-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Filters ── */
    .filters { display: flex; gap: 28px; flex-wrap: wrap; }

    .filter-group {}
    .filter-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    .pills { display: flex; gap: 6px; flex-wrap: wrap; }

    .pill {
      padding: 6px 15px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.83rem;
      cursor: pointer;
      background: white;
      color: var(--muted);
      transition: all 0.15s;
      font-weight: 500;
      user-select: none;
    }
    .pill:hover { border-color: var(--primary); color: var(--primary); }
    .pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* ── Suggestions ── */
    .suggestions {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .suggestions-label { font-size: 0.8rem; color: var(--muted); }
    .suggestion-chip {
      padding: 4px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion-chip:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

    /* ── Results ── */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .results-count { font-size: 0.9rem; color: var(--muted); }
    .results-count strong { color: var(--text); }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: var(--radius);
      padding: 20px 22px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      display: block;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.15s;
      box-shadow: var(--shadow);
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(99,102,241,0.12);
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }
    .card-tags { display: flex; gap: 5px; flex-shrink: 0; }

    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .tag-seed    { background: #f0fdf4; color: #16a34a; }
    .tag-a       { background: #eff6ff; color: #2563eb; }
    .tag-b       { background: #faf5ff; color: #7c3aed; }
    .tag-late    { background: #fff7ed; color: #c2410c; }
    .tag-ipo     { background: #fefce8; color: #a16207; }
    .tag-default { background: #f8fafc; color: #64748b; }

    .card-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .card-meta .dot { margin: 0 6px; }

    .card-desc {
      font-size: 0.88rem;
      color: #475569;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      margin-top: 12px;
      font-size: 0.83rem;
      color: var(--primary);
      font-weight: 600;
    }

    /* ── States ── */
    .state-box {
      text-align: center;
      padding: 70px 20px;
      color: var(--muted);
    }
    .state-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .state-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .state-sub { font-size: 0.9rem; }

    .spinner-wrap { text-align: center; padding: 60px 20px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { font-size: 0.9rem; color: var(--muted); }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .search-row { flex-direction: column; }
      .card-top { flex-direction: column; }
      .filters { gap: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">📡 Investment<span>Radar</span></div>
    <div class="tagline">Discover companies that recently announced a funding round</div>
  </div>
</header>

<div class="container">

  <div class="search-card">
    <div class="search-row">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Filter by industry, location or keyword (e.g. fintech, London, AI…)"
      />
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>

    <div class="filters">
      <div class="filter-group">
        <div class="filter-label">Date Range</div>
        <div class="pills" id="datePills">
          <button class="pill active" onclick="setDate(this,7)">Last 7 days</button>
          <button class="pill" onclick="setDate(this,30)">Last 30 days</button>
          <button class="pill" onclick="setDate(this,90)">Last 90 days</button>
          <button class="pill" onclick="setDate(this,0)">Any time</button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-label">Round Stage</div>
        <div class="pills" id="stagePills">
          <button class="pill active" onclick="setStage(this,'all')">All stages</button>
          <button class="pill" onclick="setStage(this,'seed')">Seed / Pre-seed</button>
          <button class="pill" onclick="setStage(this,'a')">Series A</button>
          <button class="pill" onclick="setStage(this,'b')">Series B / C</button>
          <button class="pill" onclick="setStage(this,'late')">Series D+</button>
        </div>
      </div>
    </div>

    <div class="suggestions">
      <span class="suggestions-label">Try:</span>
      <span class="suggestion-chip" onclick="setKeyword('fintech')">fintech</span>
      <span class="suggestion-chip" onclick="setKeyword('AI startup')">AI startup</span>
      <span class="suggestion-chip" onclick="setKeyword('healthtech')">healthtech</span>
      <span class="suggestion-chip" onclick="setKeyword('climate tech')">climate tech</span>
      <span class="suggestion-chip" onclick="setKeyword('SaaS')">SaaS</span>
      <span class="suggestion-chip" onclick="setKeyword('London')">London</span>
      <span class="suggestion-chip" onclick="setKeyword('Latin America')">Latin America</span>
    </div>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>
  <div id="resultsArea"></div>

</div>

<script>
  const PROXY = 'https://api.allorigins.win/raw?url=';

  let selectedDays  = 7;
  let selectedStage = 'all';
  let allItems      = [];

  /* ── Filter state ── */
  function setDate(el, days) {
    document.querySelectorAll('#datePills .pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    selectedDays = days;
    filterAndRender();
  }

  function setStage(el, stage) {
    document.querySelectorAll('#stagePills .pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    selectedStage = stage;
    doSearch();
  }

  function setKeyword(kw) {
    document.getElementById('searchInput').value = kw;
    doSearch();
  }

  /* ── Build RSS query ── */
  function buildQuery(keyword) {
    const stageMap = {
      all:  '"funding round" OR "series A" OR "series B" OR "series C" OR "seed round" OR "pre-seed" OR "raises" OR "secures funding" OR "closes round"',
      seed: '"seed round" OR "pre-seed" OR "seed funding" OR "seed investment" OR "angel round"',
      a:    '"series A" OR "series A round" OR "series A funding" OR "series A investment"',
      b:    '"series B" OR "series C" OR "series B round" OR "series C round"',
      late: '"series D" OR "series E" OR "series F" OR "late stage" OR "growth round"',
    };
    const base = stageMap[selectedStage] || stageMap.all;
    return keyword ? `(${base}) "${keyword}"` : base;
  }

  /* ── Parse Google News RSS ── */
  function parseRSS(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    return Array.from(doc.querySelectorAll('item')).map(item => {
      const raw   = item.querySelector('title')?.textContent || '';
      const link  = item.querySelector('link')?.textContent || '#';
      const pub   = item.querySelector('pubDate')?.textContent || '';
      const desc  = item.querySelector('description')?.textContent || '';
      const src   = item.querySelector('source')?.textContent || extractHost(link);

      // Strip " - Source Name" from end of title
      const title = raw.replace(/\s+[-–]\s+[\w\s&.,']+$/, '').trim();

      // Strip HTML from description
      const tmp = document.createElement('div');
      tmp.innerHTML = desc;
      const cleanDesc = (tmp.textContent || '').trim();

      return { title, link, pubDate: new Date(pub), description: cleanDesc, source: src };
    });
  }

  function extractHost(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
  }

  /* ── Detect stage tag from text ── */
  function detectTag(text) {
    const t = text.toLowerCase();
    if (t.match(/pre.?seed/))                             return { label: 'Pre-seed', cls: 'tag-seed' };
    if (t.match(/seed/))                                  return { label: 'Seed',     cls: 'tag-seed' };
    if (t.match(/series a/))                              return { label: 'Series A', cls: 'tag-a' };
    if (t.match(/series b/))                              return { label: 'Series B', cls: 'tag-b' };
    if (t.match(/series c/))                              return { label: 'Series C', cls: 'tag-b' };
    if (t.match(/series [def]/))                          return { label: 'Series D+', cls: 'tag-late' };
    if (t.match(/\bipo\b|initial public offering/))       return { label: 'IPO',      cls: 'tag-ipo' };
    if (t.match(/raises|raised|funding|investment/))      return { label: 'Funding',  cls: 'tag-default' };
    return null;
  }

  /* ── Format date ── */
  function fmtDate(d) {
    if (!(d instanceof Date) || isNaN(d)) return 'Recent';
    const now  = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7)   return `${diff} days ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ── Filter & render ── */
  function filterAndRender() {
    const cutoff = selectedDays > 0
      ? new Date(Date.now() - selectedDays * 86400000)
      : null;

    const filtered = allItems.filter(it => !cutoff || it.pubDate >= cutoff);
    renderResults(filtered);
  }

  function renderResults(items) {
    const area = document.getElementById('resultsArea');

    if (items.length === 0) {
      area.innerHTML = `
        <div class="state-box">
          <div class="state-icon">📭</div>
          <div class="state-title">No announcements found</div>
          <div class="state-sub">Try broader keywords or a wider date range</div>
        </div>`;
      return;
    }

    const header = `
      <div class="results-header">
        <div class="results-count">Showing <strong>${items.length}</strong> funding announcement${items.length !== 1 ? 's' : ''}</div>
      </div>`;

    const cards = items.map(it => {
      const tag   = detectTag(it.title + ' ' + it.description);
      const tagHtml = tag ? `<span class="tag ${tag.cls}">${tag.label}</span>` : '';

      return `
        <a class="card" href="${it.link}" target="_blank" rel="noopener noreferrer">
          <div class="card-top">
            <div class="card-title">${escHtml(it.title)}</div>
            <div class="card-tags">${tagHtml}</div>
          </div>
          <div class="card-meta">
            ${escHtml(it.source)}<span class="dot">·</span>${fmtDate(it.pubDate)}
          </div>
          ${it.description ? `<div class="card-desc">${escHtml(it.description.substring(0, 220))}</div>` : ''}
          <div class="card-footer">Read full article →</div>
        </a>`;
    }).join('');

    area.innerHTML = header + cards;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Main search ── */
  async function doSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    const btn     = document.getElementById('searchBtn');
    const errBox  = document.getElementById('errorBox');
    const area    = document.getElementById('resultsArea');

    errBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Searching…';

    area.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-text">Searching for funding announcements…</div>
      </div>`;

    try {
      const q      = buildQuery(keyword);
      const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;
      const url    = PROXY + encodeURIComponent(rssUrl);

      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const text = await res.text();
      allItems   = parseRSS(text);

      if (allItems.length === 0) {
        area.innerHTML = `
          <div class="state-box">
            <div class="state-icon">🔍</div>
            <div class="state-title">No results found</div>
            <div class="state-sub">Try different keywords or select a wider date range</div>
          </div>`;
      } else {
        filterAndRender();
      }

    } catch (err) {
      errBox.textContent = '⚠️  Could not load results — please try again in a moment.';
      errBox.style.display = 'block';
      area.innerHTML = '';
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  /* ── Enter key ── */
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  /* ── Auto-load on open ── */
  doSearch();
</script>

</body>
</html>
