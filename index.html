<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Radar — Find Recent Funding Announcements</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #eef2ff;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .tagline { font-size: 0.85rem; color: var(--muted); }

    /* ── Layout ── */
    .container { max-width: 940px; margin: 0 auto; padding: 32px 20px 60px; }

    /* ── Filter card ── */
    .filter-card {
      background: white;
      border-radius: var(--radius);
      padding: 24px 26px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 32px;
      margin-bottom: 22px;
    }

    @media (max-width: 680px) {
      .filter-grid { grid-template-columns: 1fr; }
    }

    .filter-group {}
    .filter-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    .pills { display: flex; gap: 7px; flex-wrap: wrap; }

    .pill {
      padding: 7px 16px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.83rem;
      cursor: pointer;
      background: white;
      color: var(--muted);
      transition: all 0.15s;
      font-weight: 500;
      user-select: none;
    }
    .pill:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* ── Search button ── */
    .search-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .search-btn {
      padding: 13px 36px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .search-btn:hover:not(:disabled) { background: var(--primary-dark); }
    .search-btn:active:not(:disabled) { transform: scale(0.97); }
    .search-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Results ── */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .results-count { font-size: 0.9rem; color: var(--muted); }
    .results-count strong { color: var(--text); }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: var(--radius);
      padding: 20px 22px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      display: block;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.15s;
      box-shadow: var(--shadow);
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(99,102,241,0.12);
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }
    .card-tags { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .tag-seed    { background: #f0fdf4; color: #16a34a; }
    .tag-a       { background: #eff6ff; color: #2563eb; }
    .tag-b       { background: #faf5ff; color: #7c3aed; }
    .tag-late    { background: #fff7ed; color: #c2410c; }
    .tag-ipo     { background: #fefce8; color: #a16207; }
    .tag-default { background: #f8fafc; color: #64748b; }

    .card-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .card-meta .dot { margin: 0 6px; }

    .card-desc {
      font-size: 0.88rem;
      color: #475569;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      margin-top: 12px;
      font-size: 0.83rem;
      color: var(--primary);
      font-weight: 600;
    }

    /* ── States ── */
    .state-box {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .state-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .state-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .state-sub { font-size: 0.9rem; }

    .spinner-wrap { text-align: center; padding: 70px 20px; }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { font-size: 0.9rem; color: var(--muted); }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    /* ── Welcome state ── */
    .welcome-box {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .welcome-icon { font-size: 4rem; margin-bottom: 18px; }
    .welcome-title { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .welcome-sub { font-size: 0.92rem; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">📡 Investment<span>Radar</span></div>
    <div class="tagline">Discover companies that recently announced a funding round</div>
  </div>
</header>

<div class="container">

  <div class="filter-card">
    <div class="filter-grid">

      <!-- Date Range -->
      <div class="filter-group">
        <div class="filter-label">📅 Date Range</div>
        <div class="pills" id="datePills">
          <button class="pill active" onclick="setFilter('date', this, '7')">Last 7 days</button>
          <button class="pill" onclick="setFilter('date', this, '30')">Last 30 days</button>
          <button class="pill" onclick="setFilter('date', this, '90')">Last 90 days</button>
          <button class="pill" onclick="setFilter('date', this, '0')">Any time</button>
        </div>
      </div>

      <!-- Round Stage -->
      <div class="filter-group">
        <div class="filter-label">🚀 Round Stage</div>
        <div class="pills" id="stagePills">
          <button class="pill active" onclick="setFilter('stage', this, 'all')">All stages</button>
          <button class="pill" onclick="setFilter('stage', this, 'seed')">Seed / Pre-seed</button>
          <button class="pill" onclick="setFilter('stage', this, 'a')">Series A</button>
          <button class="pill" onclick="setFilter('stage', this, 'b')">Series B / C</button>
          <button class="pill" onclick="setFilter('stage', this, 'late')">Series D+</button>
        </div>
      </div>

      <!-- Region -->
      <div class="filter-group">
        <div class="filter-label">🌍 Region</div>
        <div class="pills" id="regionPills">
          <button class="pill active" onclick="setFilter('region', this, 'all')">All regions</button>
          <button class="pill" onclick="setFilter('region', this, 'north-america')">North America</button>
          <button class="pill" onclick="setFilter('region', this, 'europe')">Europe</button>
          <button class="pill" onclick="setFilter('region', this, 'latam')">Latin America</button>
          <button class="pill" onclick="setFilter('region', this, 'asia')">Asia Pacific</button>
          <button class="pill" onclick="setFilter('region', this, 'mea')">Middle East & Africa</button>
        </div>
      </div>

      <!-- Industry -->
      <div class="filter-group">
        <div class="filter-label">🏭 Industry</div>
        <div class="pills" id="industryPills">
          <button class="pill active" onclick="setFilter('industry', this, 'all')">All industries</button>
          <button class="pill" onclick="setFilter('industry', this, 'fintech')">Fintech</button>
          <button class="pill" onclick="setFilter('industry', this, 'ai')">AI / ML</button>
          <button class="pill" onclick="setFilter('industry', this, 'healthtech')">Healthtech</button>
          <button class="pill" onclick="setFilter('industry', this, 'climate')">Climate Tech</button>
          <button class="pill" onclick="setFilter('industry', this, 'saas')">SaaS / B2B</button>
          <button class="pill" onclick="setFilter('industry', this, 'ecommerce')">E-commerce</button>
          <button class="pill" onclick="setFilter('industry', this, 'edtech')">Edtech</button>
          <button class="pill" onclick="setFilter('industry', this, 'cybersecurity')">Cybersecurity</button>
          <button class="pill" onclick="setFilter('industry', this, 'biotech')">Biotech</button>
          <button class="pill" onclick="setFilter('industry', this, 'proptech')">Proptech</button>
        </div>
      </div>

    </div>

    <div class="search-footer">
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>
  <div id="resultsArea">
    <div class="welcome-box">
      <div class="welcome-icon">📡</div>
      <div class="welcome-title">Ready to search</div>
      <div class="welcome-sub">Select your filters above and hit <strong>Search</strong><br>to discover the latest funding announcements.</div>
    </div>
  </div>

</div>

<script>
  const PROXY = 'https://api.allorigins.win/raw?url=';

  const filters = {
    date:     '7',
    stage:    'all',
    region:   'all',
    industry: 'all',
  };

  let allItems = [];

  /* ── Set a filter ── */
  function setFilter(type, el, value) {
    const groupIds = { date: 'datePills', stage: 'stagePills', region: 'regionPills', industry: 'industryPills' };
    document.querySelectorAll(`#${groupIds[type]} .pill`).forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    filters[type] = value;
  }

  /* ── Build RSS search query ── */
  function buildQuery() {
    const stageParts = {
      all:  '"funding round" OR "series A" OR "series B" OR "series C" OR "seed round" OR "pre-seed" OR "raises" OR "secures funding" OR "closes round"',
      seed: '"seed round" OR "pre-seed" OR "seed funding" OR "seed investment" OR "angel round"',
      a:    '"series A" OR "series A round" OR "series A funding"',
      b:    '"series B" OR "series C" OR "series B round" OR "series C round"',
      late: '"series D" OR "series E" OR "series F" OR "late stage" OR "growth round"',
    };

    const regionParts = {
      all:           '',
      'north-america': '"United States" OR "US startup" OR "Canada" OR "North America"',
      europe:        'Europe OR "United Kingdom" OR Germany OR France OR Spain OR Netherlands OR Sweden OR "Nordic"',
      latam:         '"Latin America" OR Brazil OR Mexico OR Argentina OR Colombia OR Chile OR Peru',
      asia:          '"Asia Pacific" OR India OR Singapore OR Japan OR "South Korea" OR Indonesia OR Australia',
      mea:           '"Middle East" OR Africa OR UAE OR "Saudi Arabia" OR Nigeria OR Kenya OR Israel',
    };

    const industryParts = {
      all:          '',
      fintech:      'fintech OR "financial technology" OR neobank OR payments OR insurtech OR wealthtech',
      ai:           '"artificial intelligence" OR "machine learning" OR AI startup OR LLM OR "generative AI"',
      healthtech:   'healthtech OR "digital health" OR medtech OR "health startup" OR telemedicine',
      climate:      '"climate tech" OR cleantech OR "green energy" OR "carbon" OR sustainability OR "renewable"',
      saas:         'SaaS OR "B2B software" OR "enterprise software" OR "cloud platform"',
      ecommerce:    'e-commerce OR ecommerce OR "online retail" OR marketplace OR "direct to consumer"',
      edtech:       'edtech OR "education technology" OR "online learning" OR "learning platform"',
      cybersecurity: 'cybersecurity OR "cyber security" OR "information security" OR "data security"',
      biotech:      'biotech OR biotechnology OR "life sciences" OR pharmaceutical OR genomics',
      proptech:     'proptech OR "real estate tech" OR "property technology" OR "real estate startup"',
    };

    const parts = [stageParts[filters.stage] || stageParts.all];
    if (regionParts[filters.region])   parts.push(regionParts[filters.region]);
    if (industryParts[filters.industry]) parts.push(industryParts[filters.industry]);

    return parts.map(p => `(${p})`).join(' ');
  }

  /* ── Parse Google News RSS ── */
  function parseRSS(xml) {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    return Array.from(doc.querySelectorAll('item')).map(item => {
      const raw  = item.querySelector('title')?.textContent || '';
      const link = item.querySelector('link')?.textContent || '#';
      const pub  = item.querySelector('pubDate')?.textContent || '';
      const desc = item.querySelector('description')?.textContent || '';
      const src  = item.querySelector('source')?.textContent || extractHost(link);

      // Strip " - Source Name" suffix from Google News titles
      const title = raw.replace(/\s+[-–]\s+[\w\s&.,'"]+$/, '').trim();

      const tmp = document.createElement('div');
      tmp.innerHTML = desc;
      const cleanDesc = (tmp.textContent || '').trim();

      return { title, link, pubDate: new Date(pub), description: cleanDesc, source: src };
    });
  }

  function extractHost(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
  }

  /* ── Detect stage tag ── */
  function detectTag(text) {
    const t = text.toLowerCase();
    if (t.match(/pre.?seed/))                         return { label: 'Pre-seed',  cls: 'tag-seed' };
    if (t.match(/\bseed\b/))                          return { label: 'Seed',      cls: 'tag-seed' };
    if (t.match(/series a/))                          return { label: 'Series A',  cls: 'tag-a' };
    if (t.match(/series b/))                          return { label: 'Series B',  cls: 'tag-b' };
    if (t.match(/series c/))                          return { label: 'Series C',  cls: 'tag-b' };
    if (t.match(/series [def]/))                      return { label: 'Series D+', cls: 'tag-late' };
    if (t.match(/\bipo\b|initial public offering/))   return { label: 'IPO',       cls: 'tag-ipo' };
    if (t.match(/raises|raised|funding|investment/))  return { label: 'Funding',   cls: 'tag-default' };
    return null;
  }

  /* ── Format date ── */
  function fmtDate(d) {
    if (!(d instanceof Date) || isNaN(d)) return 'Recent';
    const diff = Math.floor((Date.now() - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7)   return `${diff} days ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ── Filter by date client-side ── */
  function filterByDate(items) {
    const days = parseInt(filters.date, 10);
    if (!days) return items;
    const cutoff = new Date(Date.now() - days * 86400000);
    return items.filter(it => it.pubDate >= cutoff);
  }

  /* ── Render results ── */
  function renderResults(items) {
    const area = document.getElementById('resultsArea');

    if (items.length === 0) {
      area.innerHTML = `
        <div class="state-box">
          <div class="state-icon">📭</div>
          <div class="state-title">No announcements found</div>
          <div class="state-sub">Try selecting broader filters or a wider date range</div>
        </div>`;
      return;
    }

    const header = `
      <div class="results-header">
        <div class="results-count">Showing <strong>${items.length}</strong> funding announcement${items.length !== 1 ? 's' : ''}</div>
      </div>`;

    const cards = items.map(it => {
      const tag     = detectTag(it.title + ' ' + it.description);
      const tagHtml = tag ? `<span class="tag ${tag.cls}">${tag.label}</span>` : '';

      return `
        <a class="card" href="${it.link}" target="_blank" rel="noopener noreferrer">
          <div class="card-top">
            <div class="card-title">${escHtml(it.title)}</div>
            <div class="card-tags">${tagHtml}</div>
          </div>
          <div class="card-meta">
            ${escHtml(it.source)}<span class="dot">·</span>${fmtDate(it.pubDate)}
          </div>
          ${it.description ? `<div class="card-desc">${escHtml(it.description.substring(0, 240))}</div>` : ''}
          <div class="card-footer">Read full article →</div>
        </a>`;
    }).join('');

    area.innerHTML = header + cards;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /* ── Main search ── */
  async function doSearch() {
    const btn    = document.getElementById('searchBtn');
    const errBox = document.getElementById('errorBox');
    const area   = document.getElementById('resultsArea');

    errBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Searching…';

    area.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-text">Searching for funding announcements…</div>
      </div>`;

    try {
      const q      = buildQuery();
      const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;
      const url    = PROXY + encodeURIComponent(rssUrl);

      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const text = await res.text();
      allItems = parseRSS(text);

      const filtered = filterByDate(allItems);
      renderResults(filtered);

    } catch (err) {
      errBox.textContent = '⚠️  Could not load results — please try again in a moment.';
      errBox.style.display = 'block';
      area.innerHTML = '';
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }
</script>

</body>
</html>
